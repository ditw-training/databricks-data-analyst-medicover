# Reference DABs / Declarative Automation Bundles example.
# Validate against the current Databricks CLI/docs before live use.
# This file has NOT been deployed or run against a live workspace - see
# Day 2 notebook (notebooks/demo/day2_02_performance_automation_cicd.ipynb) for
# the `databricks bundle validate` instructions and the orientation-level
# scope note.

bundle:
  name: retailhub_kpi_dashboard

variables:
  catalog:
    description: Target Unity Catalog catalog
    default: training_dbx_ana_medi_trainer

resources:
  jobs:
    refresh_gold_bi_dataset:
      name: refresh_gold_bi_dataset
      trigger:
        periodic:
          interval: 1
          unit: DAYS
      tasks:
        - task_key: validate_sources
          notebook_task:
            notebook_path: ../notebooks/demo/day1_01_lakehouse_sql_gold.ipynb
            source: WORKSPACE
        - task_key: refresh_gold
          depends_on:
            - task_key: validate_sources
          notebook_task:
            notebook_path: ../notebooks/demo/day1_02_gold_modeling_for_powerbi.ipynb
            source: WORKSPACE
        - task_key: refresh_incremental_view
          depends_on:
            - task_key: refresh_gold
          notebook_task:
            notebook_path: ../notebooks/demo/day2_01_powerbi_semantic_model.ipynb
            source: WORKSPACE
        - task_key: validate_bi_readiness
          depends_on:
            - task_key: refresh_incremental_view
          notebook_task:
            notebook_path: ../notebooks/demo/day2_02_performance_automation_cicd.ipynb
            source: WORKSPACE

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: training_dbx_ana_medi_dev
  prod:
    mode: production
    variables:
      catalog: training_dbx_ana_medi_prod
